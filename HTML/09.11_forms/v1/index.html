<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>

    </header>
    <main>
        <section>
            <form action="#">
                <p>
                    Title <br>
                    <input type="radio" id="mr" name="title">
                    <label for="mr">Mr.</label>
                    <input type="radio" id="mrs" name="title">
                    <label for="mrs">Mrs.</label>
                    <input type="radio" name="title" id="miss">
                    <label for="miss">Miss</label>
                </p>
                <p>
                    <label for="fname">First name</label><br>
                    <input type="text" id="fname" name="fname">
                </p>
                <p>
                    <label for="lname">Last name</label><br>
                    <input type="text" id="lname" name="lname">
                </p>
                <p>
                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email">
                </p>
                <p>
                    <label for="phone">Phone numbere</label><br>
                    <input type="tel" id="phone" name="phone">
                </p>
                <p>
                    <label for="pass">Password</label><br>
                    <input type="password" id="pass" name="password">
                </p>
                <p>
                    <label for="cnt">Country</label><br>
                    <select name="country" id="cnr">
                        <option value="none" selected>-Choose country-</option>
                        <option value="lt">Lithuania</option>
                        <option value="lv">Latvia</option>
                        <option value="ee">Estonia</option>
                    </select>
                </p>
                <p>
                    <input type="checkbox" id="agr" required>
                    <label for="agr">I agree to the <a href="">terms and conditions</a></label>
                </p>
                <button>Sign up</button>
                <button type="reset">Reset form</button>
            </form>
        </section>
    </main>
    <footer>

    </footer>
</body>

</html>
