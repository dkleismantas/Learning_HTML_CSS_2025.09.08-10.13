<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>

    </header>

    <body>
        <section>
            <h1>Užpildykite formą</h1>
            <p style="font-size: small;"><b>Visi laukai privalomi</b></p>
            <div>
                <form action="#">
                    <p>
                        <label for="name">Vardas (iš didžiosio raidės):</label>
                    </p>
                    <p><input type="text" id="name" name="name" placeholder="Vardas" required></p>
                    <p><label for="num">Jūsų telefono numeris:</label></p>
                    <p><input type="tel" name="number" id="num" placeholder="+370-xxx-xxxXX" required></p>
                    <p><label for="eml">El.pašto adresas:</label></p>
                    <p><input type="email" name="email" id="eml" placeholder="el.p.adresas" required></p>
                    <p><label for="url">Jūsų mėgstamiausios internetinės svetainės adresas:</label></p>
                    <p><input type="url" name="url" id="url" placeholder="url adresas" required></p>
                    <p><label for="bdate">Jūsų gimimo data:</label></p>
                    <p><input type="date" name="date" id="bdate"></p>
                    <p><label for="age">Jūsų amžius (18-65):</label></p>
                    <p><input type="number" name="age" id="age" min="18" max="65" placeholder="nuo 18 iki 65 metų" style="width: 170px;"></p>
                    <p><label for="zip">Jūsų pašto kodas:</label></p>
                    <p><input type="text" name="zip" id="zip" placeholder="XX-01234" required></p>
                    <p><label for="col">Jūsų mėgstamiausia spalva:</label></p>
                    <p style="margin-bottom: 1px;"><input type="color" name="col" id="col" value="color" required></p>
                    <button type="submit">Pateikti</button>
                </form>
            </div>
        </section>
    </body>
    <footer>

    </footer>
</body>

</html>
