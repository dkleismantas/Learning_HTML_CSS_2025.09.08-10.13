<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-image: linear-gradient(to bottom right, #72B6E3, #9A5BB4);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            font-family: Arial, Helvetica, sans-serif;
        }

        section {
            width: 420px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 10%;
            padding-top: 1px;
            padding-bottom: 45px;
            background-color: white;
        }

        h1 {
            margin-top: 14px;
            margin-left: 15px;
            margin-bottom: 10px;
        }

        .inline {
            display: inline-block;
            width: 200px;
            vertical-align: top;
        }

        .inline2 {
            display: inline-block;
            width: 180px;
            vertical-align: top;
        }

        .inline3 {
            display: inline-block;
            width: 95px;
            vertical-align: top;
        }

        .inline4 {
            display: inline-block;
            width: 150px;
            vertical-align: top;
        }

        .p {
            margin-bottom: 15px;
        }

        form {
            width: 92%;
            margin-left: auto;
            margin-right: auto;
        }

        p {
            margin-bottom: 1px;
            margin-top: 5px;
        }

        .btn {
            width: 95%;
            margin-left: auto;
            margin-right: auto;
            margin-top: 30px;
            background-image: linear-gradient(to right, #72B6E3, #9A5BB4);
            background-repeat: no-repeat;
            color: white;
            border: 0;
            padding-top: 5px;
            padding-bottom: 5px;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h1><span
                    style="background-image: linear-gradient(to bottom right, #72B6E3, #9A5BB4); background-repeat: no-repeat; background-size: 100% 2px; background-position: 0 100%;">Re</span>gistration
            </h1>
            <form action="#">
                <div class="inline">
                    <p><label for="name">Full name</label></p>
                    <p class="p"><input type="text" name="name" id="name" placeholder="Enter your name"></p>
                    <p><label for="email">Email</label></p>
                    <p class="p"><input type="email" name="email" id="email" placeholder="Enter your email"></p>
                    <p><label for="pass">Password</label></p>
                    <p class="p"><input type="password" name="password" id="pass" placeholder="Enter your password"></p>
                </div>
                <div class="inline2">
                    <p><label for="uname">Username</label></p>
                    <p class="p"><input type="text" name="uname" id="uname" placeholder="Enter your username"></p>
                    <p><label for="pnum">Phone number</label></p>
                    <p class="p"><input type="tel" name="phnumber" id="pnum" placeholder="Enter your number"></p>
                    <p><label for="cpass">Confirm password</label></p>
                    <p class="p"><input type="password" name="cpass" id="cpass"></p>
                </div>
                <div>
                    <p style="margin-bottom: 8px; padding-top:x;">Gender</p>
                    <span class="inline3">
                        <input type="radio" name="gender" id="male" value="male">
                        <label for="male">Male</label>
                    </span>
                    <span class="inline3">
                        <input type="radio" name="gender" id="female" value="female">
                        <label for="female">Female</label>
                    </span>
                    <span class="inline4">
                        <input type="radio" name="gender" id="na" value="prefer not to say">
                        <label for="na">Prefer not to say</label>
                    </span>
                </div>
                <div style="text-align: center;">
                    <button class="btn">Register</button>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
