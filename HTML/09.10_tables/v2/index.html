<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,
        tr,
        th,
        td {
            border: 1px solid #E0E0E0;
            border-collapse: collapse;
        }

        th {
            text-align: left;
        }

        td {
            vertical-align: top;
        }
    </style>
</head>

<body>
    <header>

    </header>
    <main>
        <section>
            <table>
                <caption>Mokinių tvarkaraščio pavyzdys</caption>
                <tr>
                    <th>Diena</th>
                    <th>Dalykas</th>
                    <th>Klasė</th>
                    <th>Pastaba</th>
                </tr>
                <tr>
                    <td rowspan="2" style="background-color: #ADD8E6;">Pirmadienis</td>
                    <td style="background-color: #90EE90;">Matematika</td>
                    <td rowspan="2" style="background-color: #FFC0CB;">5A</td>
                    <td style="background-color: #FFFFE0;">Kontrolinis</td>
                </tr>
                <tr>
                    <td style="background-color: #FFA500;">Lietuvių kalba</td>
                    <td style="background-color: #D3D3D3;">Namų darbai</td>
                </tr>
                <tr>
                    <td style="background-color: #F08080;">Antradienis</td>
                    <td colspan="2" style="background-color: #20B2AA;">Kūno kultūra (jungtinė pamoka)</td>
                    <td style="background-color: #FFB6C1;">Sporto salė</td>
                </tr>
            </table>
        </section>
    </main>
    <footer>

    </footer>
</body>

</html>
