<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pavyzdys</title>
    <style>
        * {
            margin: 0;
        }

        div {
            background-color: lightseagreen;
            border: 1px solid grey;
            padding: 1px;
            margin-top: 2px;
        }

        .parent {
            font-size: 30px;
        }
    </style>
</head>

<body>

    <p style="font-size: 1em;">1 em</p>
    <p style="font-size: 1rem;">1 rem</p>

    <div class="parent">
        <p style="font-size: 1em;">1 em</p>
        <p style="font-size: 1rem;">1 rem</p>
    </div>

    <div class="parent">
        <p style="font-size: 2em;">2 em</p>
        <p style="font-size: 2rem;">2 rem</p>
    </div>

</body>

</html>
