<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pavyzdys</title>

    <style>
        div {
            background-color: lightseagreen;
            border: 1px solid grey;
            padding: 5px;
            margin-top: 5px;

        }

        .procentai-50 {
            width: 50%;
        }

        .procentai-50h {
            height: 50%;
        }

        .vw-25 {
            width: 25vw;
        }

        .vh-25 {
            height: 25vh;
        }

        .parent{
            width: 400px;
            background-color: whitesmoke;
        }
    </style>
</head>

<body>

    <div class="procentai-50">50%</div>
    <div class="vw-25">25vw</div>

    <hr>

    <div class="parent">
        <div class="procentai-50">50%</div>
        <div class="vw-25">25vw</div>
    </div>

    <hr>

    <div class="vh-25">25vh</div>


</body>

</html>
