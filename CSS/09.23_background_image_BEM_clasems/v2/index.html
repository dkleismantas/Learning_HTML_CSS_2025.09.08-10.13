<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div>
            <button class="button_border_none button_color_white button_background-color_blue">Primary</button>
            <button class="button_border_none button_color_white button_background-color_green">Success</button>
            <button class="button_border_none button_color_white button_background-color_lightblue">Info</button>
            <button class="button_border_none button_color_white button_background-color_orange">Warning</button>
            <button class="button_border_none button_color_white button_background-color_red">Danger</button>
        </div>
        <div>
            <button class="button_color_blue button_background-color_transparent button_border-radius_5px button_border_blue">Primary</button>
            <button class="button_color_green button_border-radius_5px button_background-color_transparent button_border_green">Success</button>
            <button class="button_color_lightblue button_border-radius_5px button_background-color_transparent button_border_lightblue">Info</button>
            <button class="button_color_orange button_border-radius_5px button_background-color_transparent button_border_orange">Warning</button>
            <button class="button_color_red button_border-radius_5px button_background-color_transparent button_border_red">Danger</button>
        </div>
        <div>
            <button class="button_border_none button_color_white button_background-image_blue button_border-radius_5px">Primary</button>
            <button class="button_border_none button_color_white button_background-image_green button_border-radius_5px">Success</button>
            <button class="button_border_none button_color_white button_background-image_lightblue button_border-radius_5px">Info</button>
            <button class="button_border_none button_color_white button_background-image_orange button_border-radius_5px">Warning</button>
            <button class="button_border_none button_color_white button_background-image_red button_border-radius_5px">Danger</button>
        </div>
        <div>
            <button class="button_border_none button_color_white button_background-color_blue button__small">Primary</button>
            <button class="button_border_none button_color_white button_background-color_green button__small">Success</button>
            <button class="button_border_none button_color_white button_background-color_lightblue button__small">Info</button>
            <button class="button_border_none button_color_white button_background-color_orange button__small">Warning</button>
            <button class="button_border_none button_color_white button_background-color_red button__small">Danger</button>
        </div>
        <div>
            <button class="button_border_none button_color_white button_background-color_blue button_border-radius_5px button_box-shadow_blue">Primary</button>
            <button class="button_border_none button_color_white button_background-color_green button_border-radius_5px button_box-shadow_green">Success</button>
            <button class="button_border_none button_color_white button_background-color_lightblue button_border-radius_5px button_box-shadow_lightblue">Info</button>
            <button class="button_border_none button_color_white button_background-color_orange button_border-radius_5px button_box-shadow_orange">Warning</button>
            <button class="button_border_none button_color_white button_background-color_red button_border-radius_5px ">Danger</button>
        </div>
    </main>
</body>

</html>
